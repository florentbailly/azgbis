# Déploiement sur VM Linux avec Podman (spec §10).
#   podman compose up -d --build                          # postgis + api + web
#   podman compose --profile tools run --rm ingest schema # puis les imports (voir pipeline/README.md)
# Compatible docker compose. Sous Podman, installer le paquet `podman-compose`
# ou le plugin docker-compose ; `podman compose` détecte l'un ou l'autre.
services:
  postgis:
    image: docker.io/postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: azgbis
      # Dev local : défaut "azgbis". En production (VPS/VM), définir AZGBIS_DB_PASSWORD
      # dans un fichier .env à côté de ce compose (jamais commité) — voir
      # docs/deploiement-vps.md. Le mot de passe ne sert que sur le réseau interne
      # des conteneurs, mais un vrai secret reste de rigueur hors du poste de dev.
      POSTGRES_PASSWORD: ${AZGBIS_DB_PASSWORD:-azgbis}
      POSTGRES_DB: azgbis
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U azgbis -d azgbis"]
      interval: 5s
      timeout: 3s
      retries: 20
    # Décommenter pour exécuter le pipeline depuis l'hôte plutôt qu'en conteneur :
    # ports:
    #   - "5432:5432"

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://azgbis:${AZGBIS_DB_PASSWORD:-azgbis}@postgis:5432/azgbis
      REPORTS_DIR: /reports
    volumes:
      - reports:/reports:ro
    depends_on:
      postgis:
        condition: service_healthy
    restart: unless-stopped

  # Rapports PDF (spec §8) : consomme la file report_jobs, capture les cartes en
  # chargeant le front (service web) via Playwright, écrit les PDF dans le volume
  # `reports` que l'API sert en téléchargement. Purge automatique après 24 h.
  # Contexte ./worker (dépendances seules) : podman-compose ignore `build.dockerfile`
  # (re-constaté le 16/07/2026 — il construit le Dockerfile du contexte) ; le code
  # backend est monté en volume, le worker exécute donc le même code que l'API.
  worker:
    build: ./worker
    environment:
      DATABASE_URL: postgresql://azgbis:${AZGBIS_DB_PASSWORD:-azgbis}@postgis:5432/azgbis
      RENDER_URL: http://web:80
      REPORTS_DIR: /reports
    volumes:
      - ./backend/app:/app/app:ro
      - reports:/reports
    depends_on:
      postgis:
        condition: service_healthy
      web:
        condition: service_started
    restart: unless-stopped

  web:
    # Dockerfile à la racine : podman-compose (Windows) ignore la clé `dockerfile:`
    # et exige un Dockerfile au niveau du contexte (constaté le 16/07/2026).
    build: .
    ports:
      - "80:80"
    depends_on:
      - api
    volumes:
      - tiles:/srv/tiles:ro
    restart: unless-stopped

  # Pipeline batch : lancé à la demande, jamais en service permanent.
  #   podman compose --profile tools run --rm ingest dvf --dept 69 --years 2021-2025
  ingest:
    build: ./pipeline
    profiles: ["tools"]
    environment:
      DATABASE_URL: postgresql://azgbis:${AZGBIS_DB_PASSWORD:-azgbis}@postgis:5432/azgbis
    depends_on:
      postgis:
        condition: service_healthy
    volumes:
      - raw:/pipeline/raw
      - tiles:/srv/tiles

volumes:
  pgdata:
  raw:
  tiles:
  reports:
